id = "cross-referenced-plan"
category = "03-planning"
prompt = """
Plan the work to ship a session-resume MVP. There's one root goal and three subtasks:

- The root is the overall goal: ship session-resume (use the stable ID `session-resume-mvp`).
- Task A: land the session persistence layer (use ID `persist`). No prerequisites.
- Task B: add the resume endpoint (use ID `resume-endpoint`). Can't start until persistence (A) is done.
- Task C: write an integration test (use ID `integration-test`). Can't start until BOTH persistence (A) AND the endpoint (B) are done.

Use the org-mode-canonical way to express both stable identifiers and inter-task prerequisites on each task. All four headlines are TODO. Output ONLY the org-mode text.
"""

